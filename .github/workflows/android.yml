name: Build Mobile App APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Clean Previous Builds
      run: |
        rm -rf loopapp android ios node_modules package-lock.json capacitor.config.json www output-apk

    - name: Install Dependencies
      run: |
        npm init -y
        npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

    - name: Initialize Web Directory
      run: |
        mkdir -p www
        if [ -f "index.html" ]; then
          cp index.html www/
        elif [ -f "Index.html" ]; then
          cp Index.html www/index.html
        else
          echo "<h1>Cafe Bill Pro</h1>" > www/index.html
        fi

    - name: Configure Capacitor
      run: |
        # ഇവിടെ ആപ്പിന്റെ പേര് Cafe Bill Pro എന്നും പാക്കേജ് ഐഡി com.aonemedi
