name: Build Mobile App APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Clean Previous Builds
      run: |
        rm -rf android ios node_modules package-lock.json capacitor.config.json www output-apk

    - name: Install Dependencies
      run: |
        npm init -y
        npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

    - name: Initialize Web Directory
      run: |
        mkdir -p www
        if [ -f "index.html" ]; then
          cp index.html www/
        elif [ -f "Index.html" ]; then
          cp Index.html www/index.html
        else
          echo "<h1>Cafe Bill Pro</h1>" > www/index.html
        fi

    - name: Configure Capacitor
      run: |
        npx cap init "Cafe Bill Pro" "com.aonemedia.cafebill" --web-dir=www

    - name: Add Android Platform
      run: |
        npx cap add android

    - name: Sync Web Code to Android
      run: |
        npx cap sync android

    - name: Process and Inject Custom Icon
      run: |
        if [ -f "icon.png" ]; then
          echo "Processing icon.png..."
          # ആൻഡ്രോയിഡ് ടൂളുകൾ ഇമേജ് തെറ്റായി കംപൈൽ ചെയ്യാതിരിക്കാൻ
          # പഴയ ലോഗോ ബാക്ക്ഗ്രൗണ്ടുകൾ മാറ്റി പുതിയ ഫോൾഡറുകൾ ക്രിയേറ്റ് ചെയ്യുന്നു
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          # നിങ്ങളുടെ icon.png എല്ലാ ലോഗോ പ്ലേസുകളിലേക്കും നിർബന്ധിതമായി കോപ്പി ചെയ്യുന്നു
          cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          
          # എറർ ഉണ്ടാക്കാൻ സാധ്യതയുള്ള പഴയ ഡിഫോൾട്ട് വെക്റ്റർ ഐക്കണുകൾ നീക്കം ചെയ്യുന്നു
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          echo "Icon process completed successfully."
        fi

    - name: Build Official Android Release APK
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Upload Finished APK to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: CafeBillPro-Official-APK
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
