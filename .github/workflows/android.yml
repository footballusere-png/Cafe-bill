name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Mobile App Framework
      run: |
        cordova create app com.aonemedia.cafebill CafeBillPro
        cd app
        cordova platform add android@12.0.0
        
    - name: Inject HTML Code & Logo
      run: |
        cd app
        rm -rf www/*
        cp ../index.html www/index.html
        if [ -f ../icon.png ]; then 
          cp ../icon.png .
          sed -i 's|<\/widget>|<icon src="icon.png" />\n<\/widget>|g' config.xml
        fi

    - name: Compile Official Android APK
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.1.1-all.zip
      run: |
        cd app
        cordova build android --release --no-telemetry

    - name: Upload Finished APK to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: CafeBillPro-Release-APK
        path: app/platforms/android/app/build/outputs/apk/release/*-release-unsigned.apk
