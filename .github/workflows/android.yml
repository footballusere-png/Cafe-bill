name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create app com.aonemedia.cafebill CafeBillPro
        cd app
        cordova platform add android@12.0.0 --variable JDK_VERSION=17
        rm -rf www/*
        cp ../index.html www/
        if [ -f ../icon.png ]; then cp ../icon.png .; echo '<icon src="icon.png" />' >> config.xml; fi

    - name: Build Android Release APK
      run: |
        cd app
        cordova build android --release -- --gradleArg=-Pandroid.useAndroidX=true --gradleArg=-Pandroid.enableJetifier=true

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: CafeBillPro-Release-APK
        path: app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
