name: Build Mobile App APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Clean Previous Builds
      run: |
        rm -rf android ios node_modules package-lock.json capacitor.config.json www output-apk

    - name: Install Dependencies
      run: |
        npm init -y
        npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

    - name: Initialize Web Directory
      run: |
        mkdir -p www
        if [ -f "index.html" ]; then
          cp index.html www/
        elif [ -f "Index.html" ]; then
          cp Index.html www/index.html
        else
          echo "<h1>Cafe Bill Pro</h1>" > www/index.html
        fi

    - name: Configure Capacitor
      run: |
        npx cap init "Cafe Bill Pro" "com.aonemedia.cafebill" --web-dir=www

    - name: Add Android Platform
      run: |
        npx cap add android

    - name: Sync Web Code to Android
      run: |
        npx cap sync android

    - name: Build Android Release APK
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Upload Finished APK to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: CafeBillPro-Capacitor-APK
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
